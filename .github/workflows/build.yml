name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: Display Java version
      run: java -version

    - name: Display Gradle version
      run: gradle --version || ./gradlew --version || echo "Neither gradle nor gradlew found"

    - name: Make Gradlew executable if exists
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          echo "gradlew found and made executable"
        else
          echo "gradlew not found, will use gradle command"
        fi

    - name: Build Debug APK
      run: |
        echo "Starting build..."
        if [ -f "gradlew" ]; then
          echo "Using gradlew"
          ./gradlew assembleDebug --stacktrace
        else
          echo "Using gradle command"
          gradle assembleDebug --stacktrace
        fi

    - name: List APK files if build succeeded
      if: success()
      run: |
        echo "Checking for APK files..."
        find . -name "*.apk" -type f || echo "No APK files found"

    - name: Upload APK as artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn