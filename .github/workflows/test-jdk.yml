name: Test JDK Setup

on:
  push:
    branches: [ master ]

jobs:
  test-jdk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
    - name: Check Java version
      run: java -version